# Application name
spring.application.name=ecommerce-audiophile-backend

# Bdd PostgreSQL
#spring.datasource.url=jdbc:postgresql://localhost:5432/audiophile_db
#spring.datasource.username=postgres
#spring.datasource.password=audiophile
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-init-sql=SET NAMES 'UTF8'
