# Application name
spring.application.name=ecommerce-audiophile-backend

# Bdd PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/audiophile_db
spring.datasource.username=postgres
spring.datasource.password=audiophile

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-init-sql=SET NAMES 'UTF8'
